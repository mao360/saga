global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "kafka-exporter"
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: "inventory"
    static_configs:
      - targets: ["inventory:8082"]

  - job_name: "order"
    static_configs:
      - targets: ["order:8080"]

  - job_name: "payment"
    static_configs:
      - targets: ["payment:8083"]
