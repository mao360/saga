services:
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:latest}
    container_name: ${PROMETHEUS_CONTAINER_NAME:-prometheus}
    restart: unless-stopped
    volumes:
      - ${PROMETHEUS_CONFIG_PATH:-./monitoring/prometheus.yml}:/etc/prometheus/prometheus.yml
    ports:
      - "${ADMIN_BIND:-0.0.0.0}:${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - saga-net

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:latest}
    container_name: ${GRAFANA_CONTAINER_NAME:-grafana}
    restart: unless-stopped
    volumes:
      - ${GRAFANA_DATA_VOLUME:-grafana_data}:/var/lib/grafana
      - ${GRAFANA_PROVISIONING_PATH:-./monitoring/grafana/provisioning}:/etc/grafana/provisioning
      - ${GRAFANA_DASHBOARDS_PATH:-./monitoring/grafana/dashboards}:/var/lib/grafana/dashboards
    ports:
      # Bind to localhost on a public host and reach Grafana via SSH tunnel.
      - "${ADMIN_BIND:-0.0.0.0}:${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=${GF_AUTH_ANONYMOUS_ENABLED:-true}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=${GF_AUTH_ANONYMOUS_ORG_ROLE:-Viewer}
      - GF_USERS_DEFAULT_THEME=${GF_USERS_DEFAULT_THEME:-dark}
    depends_on:
      - prometheus
    networks:
      - saga-net

  cadvisor:
    image: ${CADVISOR_IMAGE:-gcr.io/cadvisor/cadvisor:latest}
    container_name: ${CADVISOR_CONTAINER_NAME:-cadvisor}
    restart: unless-stopped
    ports:
      - "${ADMIN_BIND:-0.0.0.0}:${CADVISOR_PORT:-8088}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - saga-net

  # Метрики уровня хоста. cAdvisor показывает только контейнеры, поэтому iowait
  # и steal time не видны — а без них потолок нагрузки нечем объяснить: в прогоне
  # 2026-07-21 контейнеры заняли 1.612 ядра из 2, то есть в CPU не упёрлись.
  # Порт наружу не публикуется: Prometheus ходит по внутренней сети.
  node-exporter:
    image: ${NODE_EXPORTER_IMAGE:-prom/node-exporter:latest}
    container_name: ${NODE_EXPORTER_CONTAINER_NAME:-node-exporter}
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks:
      - saga-net

  kafka-exporter:
    image: ${KAFKA_EXPORTER_IMAGE:-danielqsj/kafka-exporter:latest}
    container_name: ${KAFKA_EXPORTER_CONTAINER_NAME:-kafka-exporter}
    restart: unless-stopped
    command: [ "--kafka.server=${KAFKA_EXPORTER_SERVER:-kafka:9092}" ]
    ports:
      - "${ADMIN_BIND:-0.0.0.0}:${KAFKA_EXPORTER_PORT:-9308}:9308"
    networks:
      - saga-net

networks:
  saga-net:
    external: true
    name: ${SAGA_NETWORK:-saga-net}

volumes:
  grafana_data:
    name: ${GRAFANA_DATA_VOLUME:-grafana_data}