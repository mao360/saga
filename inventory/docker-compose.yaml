services:
  postgres-inventory:
    image: postgres:16
    container_name: postgres-inventory
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inventory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inventory}
      POSTGRES_DB: ${POSTGRES_DB:-inventory}
    ports:
      # ADMIN_BIND=127.0.0.1 on a public host keeps Postgres off the internet.
      - "${ADMIN_BIND:-0.0.0.0}:${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_inventory_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: ${POSTGRES_HEALTHCHECK_TIMEOUT:-3s}
      retries: 20
    networks:
      - saga-net

  inventory:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/mao360/saga-inventory:${IMAGE_TAG:-latest}
    container_name: inventory
    restart: unless-stopped
    depends_on:
      postgres-inventory:
        condition: service_healthy
    env_file:
      - .env
    ports:
      # Metrics endpoint only — Prometheus scrapes it over the internal network.
      - "${ADMIN_BIND:-0.0.0.0}:${HTTP_PORT:-8082}:${HTTP_PORT:-8082}"
    environment:
      APP_CONFIG_PATH: /app/config.yaml
      HTTP_PORT: ${HTTP_PORT:-8082}

      DATABASE_DSN: ${DATABASE_DSN:-postgres://${POSTGRES_USER:-inventory}:${POSTGRES_PASSWORD:-inventory}@postgres-inventory:5432/${POSTGRES_DB:-inventory}?sslmode=disable}

      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:-inventory-service}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-inventory-service-v1}

      KAFKA_TOPIC_ORDER_EVENTS: ${KAFKA_TOPIC_ORDER_EVENTS:-saga.order.events}
      KAFKA_TOPIC_PAYMENT_EVENTS: ${KAFKA_TOPIC_PAYMENT_EVENTS:-saga.payment.events}
      KAFKA_TOPIC_INVENTORY_EVENTS: ${KAFKA_TOPIC_INVENTORY_EVENTS:-saga.inventory.events}
      KAFKA_TOPIC_COMMANDS: ${KAFKA_TOPIC_COMMANDS:-saga.commands}
      KAFKA_TOPIC_DLQ: ${KAFKA_TOPIC_DLQ:-saga.dlq}
      DATABASE_CONNECT_TIMEOUT: ${DATABASE_CONNECT_TIMEOUT:-10s}
      SHUTDOWN_TIMEOUT: ${SHUTDOWN_TIMEOUT:-5s}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    networks:
      - saga-net

volumes:
  postgres_inventory_data:

networks:
  saga-net:
    external: true